{% extends 'base.html' %}

{% block title %}Checkout | Bella Vita Wear{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Checkout</h2>
    <div class="row">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">Shipping & Payment Details</div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        
                        <!-- Discount Code field (Optional, connected to the Loyalty system) -->
                        <div class="mb-3">
                            <label for="discount_code" class="form-label">Discount Code</label>
                            <input type="text" name="discount_code" id="discount_code" class="form-control" placeholder="Enter code if you have one">
                        </div>

                        <button type="submit" class="btn btn-success w-100 mt-3 text-uppercase fw-bold">Place Order</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-4 mt-4 mt-md-0">
            <div class="card shadow-sm">
                <div class="card-header bg-light">Order Summary</div>
                <div class="card-body">
                    <p class="d-flex justify-content-between"><span>Subtotal:</span> <span>${{ subtotal }}</span></p>
                    <p class="d-flex justify-content-between text-success"><span>Discount:</span> <span>-${{ discount_amount }}</span></p>
                    <hr>
                    <h5 class="d-flex justify-content-between fw-bold"><span>Total:</span> <span>${{ total }}</span></h5>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
