{% extends 'base.html' %}

{% block title %}My Profile | Bella Vita Wear{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Profile Information</h2>
    <div class="row">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-success">Update Profile</button>
                        <a href="{% url 'password-change' %}" class="btn btn-warning">
                            Change Password
                        </a>
                    </form>

                </div>
            </div>
        </div>
        <div class="col-md-4 mt-4 mt-md-0">
            <div class="card shadow-sm border-danger">
                <div class="card-body text-center">
                    <h5 class="text-danger">Danger Zone</h5>
                    <p class="small text-muted">Permanently delete your account and all associated data.</p>
                    <a href="{% url 'delete-account' %}" class="btn btn-outline-danger w-100">Delete Account</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
