{% extends 'base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 text-center p-5">
                <div class="card-body">
                    <div class="mb-4">
                        <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                    </div>
                    
                    <h2 class="card-title mb-3">Welcome to Bella Vita Wear!</h2>
                    <p class="card-text text-muted mb-4">
                        Your account has been created successfully! You can now log in to start exploring our designs and building your cart.
                    </p>
                    
                    <div class="d-grid gap-2">
                        <a href="{% url 'login' %}" class="btn btn-primary btn-lg">
                            Go to Login
                        </a>
                        <a href="{% url 'design-list' %}" class="btn btn-link text-decoration-none">
                            Back to Store
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
