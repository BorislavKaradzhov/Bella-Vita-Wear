<footer class="bg-light text-center text-muted py-4 mt-auto border-top">
    <div class="container d-flex justify-content-between align-items-center">

        <small>&copy; {% now "Y" %} Bella Vita Wear. All rights reserved.</small>

        <div class="d-flex align-items-center gap-3">

            {% if not user.is_authenticated %}
                <a href="{% url 'login' %}" class="text-decoration-none text-muted small">Login</a>
                <span class="text-muted small">|</span>
                <a href="{% url 'register' %}" class="text-decoration-none text-muted small">Register</a>
                <span class="text-muted small">|</span>
            {% endif %}

            <a href="{% url 'core:contact' %}" class="text-decoration-none text-muted small">
                <i class="bi bi-envelope"></i> Contact Support
            </a>

        </div>

    </div>
</footer>
