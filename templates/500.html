{% extends 'base.html' %}

{% block title %}Server Error | Bella Vita Wear{% endblock %}

{% block content %}
<div class="container text-center py-5 mt-5">
    <h1 class="display-1 fw-bold text-danger">500</h1>
    <h2 class="mb-4">Internal Server Error</h2>
    <p class="lead text-muted mb-5">Sorry, something went wrong on our end. Our team has been notified, and we are working to fix the issue.</p>

    <div class="d-flex justify-content-center gap-3">
        <a href="{% url 'design-list' %}" class="btn btn-primary btn-lg">
            <i class="bi bi-cart me-2"></i>Return to Store
        </a>
        <a href="{% url 'core:contact' %}" class="btn btn-outline-secondary btn-lg">
            <i class="bi bi-envelope me-2"></i>Contact Support
        </a>
    </div>
</div>
{% endblock %}
