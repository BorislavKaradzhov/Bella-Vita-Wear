{% extends 'base.html' %}
{% block title %}Delete Review | Bella Vita Wear{% endblock %}

{% block content %}
<div class="container my-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <i class="bi bi-exclamation-triangle text-danger display-1 mb-3 d-block"></i>
            <h2 class="mb-4">Are you sure?</h2>
            <p class="lead text-muted mb-4">
                You are about to permanently delete your review for <strong>{{ object.design.title }}</strong>. This action cannot be undone.
            </p>
            
            <form method="POST">
                {% csrf_token %}
                <a href="{% url 'reviews:my-reviews' %}" class="btn btn-outline-secondary btn-lg me-3">Cancel</a>
                <button type="submit" class="btn btn-danger btn-lg">Yes, Delete Review</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
